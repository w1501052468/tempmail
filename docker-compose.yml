services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: ./api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATA_DIR: /data
    volumes:
      - ./runtime/data:/data
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10

  janitor:
    build:
      context: .
      dockerfile: ./api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      DATA_DIR: /data
      TEMPMAIL_SKIP_STARTUP_MIGRATIONS: "1"
    volumes:
      - ./runtime/data:/data
    command:
      - sh
      - -c
      - |
        while true; do
          python -m tempmail.cli.cleanup
          sleep ${JANITOR_INTERVAL_SECONDS:-300}
        done

  domain-monitor:
    build:
      context: .
      dockerfile: ./api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      DATA_DIR: /data
      TEMPMAIL_SKIP_STARTUP_MIGRATIONS: "1"
    volumes:
      - ./runtime/data:/data
    command:
      - python
      - -m
      - tempmail.cli.domain_monitor
      - --loop

  postfix:
    build:
      context: .
      dockerfile: ./docker/postfix/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATA_DIR: /data
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
      edge:
        condition: service_started
    ports:
      - "25:25"
    volumes:
      - ./runtime/data:/data
      - ./runtime/certs:/certs
      - ./runtime/signals:/signals
      - ./config/postfix:/config/postfix:ro

  edge:
    build:
      context: .
      dockerfile: ./docker/edge/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${EDGE_HTTP_PORT:-80}:80"
      - "${EDGE_HTTPS_PORT:-443}:443"
    volumes:
      - ./runtime/certs:/certs
      - ./runtime/acme-web:/var/www/acme
      - ./runtime/signals:/signals

  acme:
    image: neilpang/acme.sh:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ACME_SERVER: ${ACME_SERVER:-letsencrypt}
    depends_on:
      edge:
        condition: service_started
    volumes:
      - ./runtime/acme:/acme.sh
      - ./runtime/acme-web:/acme-web
      - ./runtime/certs:/certs
      - ./runtime/signals:/signals
      - ./docker/acme/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]

volumes:
  pgdata:
